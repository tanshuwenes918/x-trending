name: Daily X Trending

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country names"
        required: false
        default: "Global,United States"
      categories:
        description: "Comma-separated category names"
        required: false
        default: "Technology,News,Business & Finance,Science,Travel,Gaming,Sports,Health&Fitness,cryptocurrency,cars,music,dance,celebrity,relationship,movies&tv,nature&outdoors,Entertainment,food,meme,beauty,Pets,fashion,religion,Home & Garden"
      output_format:
        description: "Export destination"
        required: false
        type: choice
        options:
          - feishu
          - json
          - both
        default: "feishu"
      dry_run:
        description: "Skip Feishu export"
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-x-trending
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      X_COUNTRIES: ${{ inputs.countries || 'Global,United States' }}
      X_CATEGORIES: ${{ inputs.categories || 'Technology,News,Business & Finance,Science,Travel,Gaming,Sports,Health&Fitness,cryptocurrency,cars,music,dance,celebrity,relationship,movies&tv,nature&outdoors,Entertainment,food,meme,beauty,Pets,fashion,religion,Home & Garden' }}
      OUTPUT_FORMAT: ${{ inputs.output_format || 'feishu' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      OUTPUT_DIR: outputs
      TIMEZONE: Asia/Shanghai
      MAX_TRENDS_PER_CATEGORY: 10
      MAX_TWEETS_PER_TREND: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          scrapling install

      - name: Run tests
        run: pytest -q

      - name: Scrape and export
        run: python main.py

      - name: Upload JSON output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x-trending-output
          path: outputs/*.json
          if-no-files-found: ignore
